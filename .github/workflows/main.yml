name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Fast Install Dependencies
        run: |
          sudo rm -rf /var/lib/apt/lists/*
          sudo apt-get update --fix-missing
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev
          pip install --upgrade pip setuptools wheel
          pip install "buildozer>=1.5.0" "cython<3.0.0" kivy

      - name: Fix Aidl and Android SDK Tools
        run: |
          # تثبيت أداة aidl بشكل مستقل ومباشر في النظام لتفادي نقصها في الـ SDK
          sudo apt-get install -y aidl
          mkdir -p ~/.buildozer/android/platform/android-sdk/build-tools/33.0.0/
          # عمل رابط سريع للأداة ليجدها المترجم فوراً في مسارها المتوقع
          sudo ln -sf /usr/bin/aidl ~/.buildozer/android/platform/android-sdk/build-tools/33.0.0/aidl

      - name: Initialize Buildozer and Build APK
        run: |
          buildozer init
          # إعداد التوافقية مع المكتبات والخدمة الخلفية للبوت
          sed -i 's/^requirements =.*/requirements = python3, kivy, ccxt, pandas, datetime, openssl, requests, certifi, urllib3, idna/' buildozer.spec
          sed -i 's/^#android.services =.*/android.services = ServiceService:service.py/' buildozer.spec
          sed -i 's/^#android.permissions =.*/android.permissions = INTERNET, FOREGROUND_SERVICE, WAKE_LOCK, RECEIVE_BOOT_COMPLETED/' buildozer.spec
          
          # فرض إعدادات الـ API المستقرة والمتوافقة مع الأداة
          sed -i 's/^#android.api =.*/android.api = 33/' buildozer.spec
          sed -i 's/^#android.minapi =.*/android.minapi = 24/' buildozer.spec
          sed -i 's/^#android.ndk_api =.*/android.ndk_api = 24/' buildozer.spec
          sed -i 's/^#android.accept_sdk_license =.*/android.accept_sdk_license = True/' buildozer.spec
          
          buildozer android debug
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TradingBot-APK
          path: bin/*.apk
