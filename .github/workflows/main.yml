name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fix APT and Install Dependencies
        run: |
          sudo rm -rf /var/lib/apt/lists/*
          sudo apt-get update --fix-missing
          # إجبار النظام على الموافقة التلقائية وتخطي أي حوار تفاعلي
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y --fix-broken
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev libreoffice-dev libmpdec-dev
          pip install --upgrade pip setuptools wheel
          pip install buildozer cython kivy

      - name: Initialize Buildozer and Build APK
        run: |
          buildozer init
          # إعداد الإعدادات وتجاوز شروط الـ SDK تلقائياً
          sed -i 's/^requirements =.*/requirements = python3, kivy, ccxt, pandas, datetime, openssl, requests, certifi, urllib3, idna/' buildozer.spec
          sed -i 's/^#android.services =.*/android.services = ServiceService:service.py/' buildozer.spec
          sed -i 's/^#android.permissions =.*/android.permissions = INTERNET, FOREGROUND_SERVICE, WAKE_LOCK, RECEIVE_BOOT_COMPLETED/' buildozer.spec
          
          # قبول شروط أندرويد تلقائياً لمنع تعليق السيرفر
          yes | buildozer -v android debug
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TradingBot-APK
          path: bin/*.apk
